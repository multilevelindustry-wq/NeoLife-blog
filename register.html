<!DOCTYPE html>
<html>

<head>

<title>Register</title>

</head>


<body>


<div style="padding:40px">


<h2>Create Account</h2>


<input id="name" placeholder="Full Name">


<input id="email" placeholder="Email">


<input id="password" 
type="password"
placeholder="Password">


<input id="manualSponsor"
placeholder="Sponsor Name">


<button onclick="register()">
Register
</button>


<br><br>

<a href="login.html">
<button>
Login
</button>
</a>


</div>



<script type="module">


import {initializeApp}

from 

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getAuth,

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

doc,

setDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  databaseURL: "https://neostore-81b57-default-rtdb.firebaseio.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717",
  measurementId: "G-1PBBK48DCK"
};


const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);





function generateID(){

return "AFF"+Date.now();

}





window.register=function(){


let name =
document.getElementById("name").value;


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;


let sponsor =
document.getElementById("manualSponsor").value;



if(!name || !email || !password){

alert("Fill all fields");

return;

}




createUserWithEmailAndPassword(
auth,
email,
password

)

.then(async(result)=>{



let uid=result.user.uid;



await setDoc(

doc(db,"users",uid),

{


id:uid,


affiliateID:generateID(),


name:name,


email:email,


sponsor:sponsor,


personalPV:0,


teamPV:0,


monthlyPV:0,


totalPV:0,


earnings:0,


withdrawable:0,


rank:"None",


downlines:[],


dateJoined:
new Date()


}


);



alert("Registration successful");


window.location.href="login.html";



})

.catch(error=>{


alert(error.message);


});


}



</script>


</body>

</html>
