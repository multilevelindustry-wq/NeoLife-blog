<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="padding:40px;">
  <h2>Please Create Account To Enjoy Our Services</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button><br><br>

  if already registered <br>
  <a href="login.html"><button>Login</button></a>
</div>

<script>

// ===============================
// GENERATE UNIQUE ID
// ===============================
function generateAffiliateID(){
  return "AFF" + Date.now() + Math.floor(Math.random()*1000);
}

// ===============================
// REGISTER
// ===============================
function register(){

  let nameValue = document.getElementById("name").value.trim();
  let emailValue = document.getElementById("email").value.trim();
  let passwordValue = document.getElementById("password").value.trim();

  if(!nameValue || !emailValue || !passwordValue){
    alert("All fields are required!");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(users.find(u => u.email === emailValue)){
    alert("Email already registered!");
    return;
  }

  // Get sponsor from URL
  let sponsorID = new URLSearchParams(window.location.search).get("ref");

  let newUser = {
    id: generateAffiliateID(),
    affiliateID: generateAffiliateID(),

    name: nameValue,
    email: emailValue,
    password: passwordValue,

    sponsorID: sponsorID || null,

    personalPV: 0,
    teamPV: 0,
    monthlyPV: 0,

    earnings: 0,
    withdrawable: 0,

    rank: "None",
    percentage: 0,

    downlines: [],

    // PROFILE INFO (EMPTY UNTIL USER FILLS)
    phone: "",
    address: "",
    bankName: "",
    accountNumber: "",
    accountName: "",

    dateJoined: new Date().toLocaleString()
  };

  users.push(newUser);

  // Update sponsor downlines
  if(sponsorID){
    let sponsor = users.find(u => u.id === sponsorID);
    if(sponsor){
      sponsor.downlines.push(newUser.id);
    }
  }

  localStorage.setItem("users", JSON.stringify(users));

  alert("Registered Successfully!");
  window.location.href = "login.html";
}

</script>

</body>
</html>
