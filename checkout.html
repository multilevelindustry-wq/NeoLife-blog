<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <!-- PayPal -->
  <script src="https://www.paypal.com/sdk/js?client-id=Aey_vJzSIErk6JUHmkIU41JQ4W1vA2FlfBNf5Vtkg7j4YLaWHkFtw4WSPI0SWiCzhaNKqPt2oGuVIF1n&currency=USD"></script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

<style>

/* ================= BACKGROUND ================= */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* ================= GLASS CARD ================= */
.wrap {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 50px 40px;
  width: 92%;
  max-width: 650px;
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  text-align: center;
  position: relative;
}

/* ================= BACK BUTTON ================= */
.back-btn {
  position: absolute;
  left: 30px;
  top: 30px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  padding: 8px 15px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
}

.back-btn:hover {
  background: rgba(255,255,255,0.35);
}

/* ================= HEADINGS ================= */
h2 {
  margin-bottom: 30px;
  font-size: 28px;
}

.summary {
  margin-bottom: 30px;
  line-height: 1.8;
  font-size: 18px;
}

/* ================= INPUT ================= */
input {
  width: 100%;
  padding: 14px;
  margin: 25px 0 35px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* ================= BUTTONS ================= */
button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  background: #00c896;
  color: white;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

#paypal-button-container {
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="wrap">

  <a href="cart.html" class="back-btn">← Back To Cart</a>

  <h2>Secure Checkout</h2>

  <div class="summary">
    <div>Total: <strong>$<span id="totalAmount"></span></strong></div>
    <div>Total PV: <strong><span id="totalPV"></span></strong></div>
  </div>

  <input type="tel" id="creditPhone" placeholder="Enter Phone Number To Be Credited">

  <div id="paypal-button-container"></div>

  <button onclick="payWithPaystack()">Pay With Paystack</button>

</div>

<script>

let order = JSON.parse(localStorage.getItem("orderSummary"));
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!order || !currentUser){
  alert("Invalid checkout session.");
  window.location.href = "index.html";
}

document.getElementById("totalAmount").innerText = order.total.toFixed(2);
document.getElementById("totalPV").innerText = order.totalPV;

let sponsorID = currentUser.sponsorID || "NONE";
let buyerUserID = currentUser.userID || "UNKNOWN";

/* ================= PAYSTACK ================= */
function payWithPaystack(){

let phone=document.getElementById("creditPhone").value.trim();
if(phone===""){ alert("Enter phone number to be credited"); return; }

let exchangeRate=1350;
let totalNGN=order.total*exchangeRate;

PaystackPop.setup({
key:"pk_live_ae2ef39d24e2f001cbc716def10d3ede5148af5b",
email:currentUser.email,
amount:Math.round(totalNGN*100),
currency:"NGN",
ref:"PS-"+Date.now(),
metadata:{
buyer_user_id:buyerUserID,
sponsor_id:sponsorID,
phone_to_credit:phone,
total_pv:order.totalPV,
products:JSON.stringify(order.cart)
},
callback:function(){
alert("Payment Successful!");
localStorage.removeItem("cart");
localStorage.removeItem("orderSummary");
window.location.href="index.html";
}
}).openIframe();

}

/* ================= PAYPAL ================= */
paypal.Buttons({

createOrder:function(data,actions){

let phone=document.getElementById("creditPhone").value.trim();
if(phone===""){ alert("Enter phone number to be credited"); return; }

let items=[];
order.cart.forEach(item=>{
items.push({
name:item.title+" (ID:"+item.id+" PV:"+item.pv+")",
unit_amount:{currency_code:"USD",value:item.price.toFixed(2)},
quantity:item.quantity.toString()
});
});

return actions.order.create({
purchase_units:[{
amount:{
currency_code:"USD",
value:order.total.toFixed(2),
breakdown:{
item_total:{currency_code:"USD",value:order.total.toFixed(2)}
}
},
items:items,
custom_id:"USER:"+buyerUserID+" | SPONSOR:"+sponsorID,
invoice_id:"INV-"+Date.now(),
description:"Phone:"+phone+" | TotalPV:"+order.totalPV
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(function(){
alert("PayPal Payment Completed!");
localStorage.removeItem("cart");
localStorage.removeItem("orderSummary");
window.location.href="index.html";
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
