<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <!-- PayPal -->
  <script src="https://www.paypal.com/sdk/js?client-id=Aey_vJzSIErk6JUHmkIU41JQ4W1vA2FlfBNf5Vtkg7j4YLaWHkFtw4WSPI0SWiCzhaNKqPt2oGuVIF1n&currency=USD"></script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

.wrap {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  width: 90%;
  max-width: 600px;
  color: white;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

button {
  padding: 12px 25px;
  margin: 15px 5px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  background-color: #00c896;
  color: white;
  font-size: 16px;
}

button:hover {
  opacity: 0.9;
}

#paypal-button-container {
  margin-top: 20px;
}
  </style>
</head>

<body>

<div class="wrap">
  <h2>Checkout Your Items ✅</h2>

  <h3>Total: $<span id="totalAmount">0.00</span></h3>
  <h3>Total PV: <span id="totalPV">0</span></h3><br><br>

  <!-- Phone Input -->
  <input type="tel" id="creditPhone" placeholder="Enter Phone Number To Be Credited" required><br>

  <h2>Nigerian (Dollar) Checkout Option 1✅</h2>
  <div id="paypal-button-container"></div><br><br>

  <h2>Nigerian (Naira) Checkout Option 2✅</h2>
  <button onclick="payWithPaystack()">Pay With Paystack</button>
</div>

<script>

// ===============================
// LOAD ORDER DATA
// ===============================
let order = JSON.parse(localStorage.getItem("orderSummary"));
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!order || !currentUser){
  alert("Invalid checkout session.");
  window.location.href = "index.html";
}

document.getElementById("totalAmount").innerText = order.total.toFixed(2);
document.getElementById("totalPV").innerText = order.totalPV;

// ===============================
// PREPARE DATA
// ===============================
let productNames = [];
let productIDs = [];
let productPVs = [];
let quantities = [];

order.cart.forEach(item=>{
  productNames.push(item.title);
  productIDs.push(item.id);
  productPVs.push(item.pv || 0);
  quantities.push(item.quantity);
});

let sponsorID = currentUser.sponsorID || "NONE";
let buyerUserID = currentUser.userID || "UNKNOWN";

// ===============================
// PAYSTACK
// ===============================
function payWithPaystack(){

  let phoneToCredit = document.getElementById("creditPhone").value.trim();

  if(phoneToCredit === ""){
    alert("Please enter phone number to be credited.");
    return;
  }

  let exchangeRate = 1350; 
  let totalUSD = order.total;
  let totalNGN = totalUSD * exchangeRate;

  var handler = PaystackPop.setup({
    key: "pk_live_ae2ef39d24e2f001cbc716def10d3ede5148af5b",
    email: currentUser.email,
    amount: Math.round(totalNGN * 100),
    currency: "NGN",
    ref: "PS-" + Date.now(),

    metadata: {
      custom_fields: [
        { display_name:"Buyer User ID", value: buyerUserID },
        { display_name:"Sponsor ID", value: sponsorID },
        { display_name:"Phone To Credit", value: phoneToCredit },
        { display_name:"Product Names", value: productNames.join(", ") },
        { display_name:"Product IDs", value: productIDs.join(", ") },
        { display_name:"Product PVs", value: productPVs.join(", ") },
        { display_name:"Quantities", value: quantities.join(", ") },
        { display_name:"Total PV", value: order.totalPV }
      ]
    },

    callback: function(response){
      alert("Paystack Payment Successful!");
      localStorage.removeItem("cart");
      localStorage.removeItem("orderSummary");
      window.location.href = "index.html";
    },

    onClose: function(){
      alert("Transaction cancelled.");
    }

  });

  handler.openIframe();
}

// ===============================
// PAYPAL
// ===============================
paypal.Buttons({

  createOrder: function(data, actions) {

    let phoneToCredit = document.getElementById("creditPhone").value.trim();

    if(phoneToCredit === ""){
      alert("Please enter phone number to be credited.");
      return;
    }

    return actions.order.create({
      purchase_units: [{
        amount: { value: order.total.toFixed(2) },
        description: `
BuyerID:${buyerUserID}
SponsorID:${sponsorID}
PhoneToCredit:${phoneToCredit}
Products:${productNames.join("|")}
IDs:${productIDs.join("|")}
PVs:${productPVs.join("|")}
TotalPV:${order.totalPV}
        `
      }]
    });
  },

  onApprove: function(data, actions) {
    return actions.order.capture().then(function(details) {
      alert("PayPal Payment Completed!");
      localStorage.removeItem("cart");
      localStorage.removeItem("orderSummary");
      window.location.href = "index.html";
    });
  }

}).render('#paypal-button-container');

</script>

</body>
</html>
