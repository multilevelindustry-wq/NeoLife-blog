<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <!-- PayPal -->
  <script src="https://www.paypal.com/sdk/js?client-id=Aey_vJzSIErk6JUHmkIU41JQ4W1vA2FlfBNf5Vtkg7j4YLaWHkFtw4WSPI0SWiCzhaNKqPt2oGuVIF1n&currency=USD"></script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

<style>

/* BACKGROUND */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* GLASS CARD */
.wrap {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 50px 40px;
  width: 92%;
  max-width: 650px;
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  text-align: center;
  position: relative;
}

/* BACK BUTTON */
.back-btn {
  position: absolute;
  left: 30px;
  top: 30px;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  padding: 8px 15px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
}

.back-btn:hover {
  background: rgba(255,255,255,0.35);
}

h2 {
  margin-bottom: 30px;
  font-size: 28px;
}

.summary {
  margin-bottom: 30px;
  line-height: 1.8;
  font-size: 18px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 25px 0 35px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  background: #00c896;
  color: white;
}

button:hover {
  opacity: 0.9;
}

#paypal-button-container {
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="wrap">

  <a href="cart.html" class="back-btn">← Back To Cart</a>

  <h2>Secure Checkout Options Available ✅</h2><br><br>

  <div class="summary">
    <div>Total: <strong>$<span id="totalAmount"></span></strong></div>
    <div>Total PV: <strong><span id="totalPV"></span></strong></div>
  </div><br>

  <h2>Enter Phone Number To Be Credited ✅</h2>
  <input type="tel" id="creditPhone" placeholder="Enter Phone Number To Be Credited">

  <h2>Pay With Dollar Currency 1✅</h2>
  <div id="paypal-button-container"></div><br><br>
    
<h2>Secure Nigerian Checkout Option 2✅</h2>
  <button onclick="payWithPaystack()"><strong>Pay With Paystack</strong></button>

</div>

<script>

let order = JSON.parse(localStorage.getItem("orderSummary"));
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!order || !currentUser){
  alert("Invalid checkout session.");
  window.location.href = "index.html";
}

document.getElementById("totalAmount").innerText = order.total.toFixed(2);
document.getElementById("totalPV").innerText = order.totalPV;

let sponsorID = currentUser.sponsorID || "NONE";
let buyerUserID = currentUser.userID || "UNKNOWN";

/* ================= PAYSTACK (FULLY FIXED) ================= */
function payWithPaystack(){

let phone=document.getElementById("creditPhone").value.trim();
if(phone===""){ alert("Enter phone number to be credited"); return; }

let exchangeRate=1350;
let totalNGN=order.total*exchangeRate;

// PREPARE PRODUCT DETAILS
let productNames=[];
let productIDs=[];
let productPVs=[];
let quantities=[];

order.cart.forEach(item=>{
  productNames.push(item.title);
  productIDs.push(item.id);
  productPVs.push(item.pv || 0);
  quantities.push(item.quantity);
});

PaystackPop.setup({
key:"pk_live_ae2ef39d24e2f001cbc716def10d3ede5148af5b",
email:currentUser.email,
amount:Math.round(totalNGN*100),
currency:"NGN",
ref:"PS-"+Date.now(),

metadata:{
  custom_fields:[

    { display_name:"Buyer User ID", variable_name:"buyer_user_id", value:buyerUserID },
    { display_name:"Sponsor ID", variable_name:"sponsor_id", value:sponsorID },
    { display_name:"Phone To Credit", variable_name:"phone_to_credit", value:phone },
    { display_name:"Product Names", variable_name:"product_names", value:productNames.join(", ") },
    { display_name:"Product IDs", variable_name:"product_ids", value:productIDs.join(", ") },
    { display_name:"Product PVs", variable_name:"product_pvs", value:productPVs.join(", ") },
    { display_name:"Quantities", variable_name:"quantities", value:quantities.join(", ") },
    { display_name:"Total PV", variable_name:"total_pv", value:order.totalPV }

  ]
},

callback:function(){
alert("Payment Successful!");
localStorage.removeItem("cart");
localStorage.removeItem("orderSummary");
window.location.href="index.html";
},

onClose:function(){
alert("Transaction cancelled.");
}

}).openIframe();

}

/* ================= PAYPAL (UNCHANGED) ================= */
paypal.Buttons({

createOrder:function(data,actions){

let phone=document.getElementById("creditPhone").value.trim();
if(phone===""){ alert("Enter phone number to be credited"); return; }

let items=[];
order.cart.forEach(item=>{
items.push({
name:item.title+" (ID:"+item.id+" PV:"+item.pv+")",
unit_amount:{currency_code:"USD",value:item.price.toFixed(2)},
quantity:item.quantity.toString()
});
});

return actions.order.create({
purchase_units:[{
amount:{
currency_code:"USD",
value:order.total.toFixed(2),
breakdown:{
item_total:{currency_code:"USD",value:order.total.toFixed(2)}
}
},
items:items,
custom_id:"USER:"+buyerUserID+" | SPONSOR:"+sponsorID,
invoice_id:"INV-"+Date.now(),
description:"Phone:"+phone+" | TotalPV:"+order.totalPV
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(function(){
alert("PayPal Payment Completed!");
localStorage.removeItem("cart");
localStorage.removeItem("orderSummary");
window.location.href="index.html";
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
