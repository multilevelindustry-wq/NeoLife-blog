<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.paypal.com/sdk/js?client-id=Aey_vJzSIErk6JUHmkIU41JQ4W1vA2FlfBNf5Vtkg7j4YLaWHkFtw4WSPI0SWiCzhaNKqPt2oGuVIF1n&currency=USD"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
/* ===============================
   BACKGROUND & BODY
================================ */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* ===============================
   WRAPPER / GLASS PANEL
================================ */
.wrap {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;
  width: 90%;
  max-width: 600px;
  color: white;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  text-align: center;
}

/* ===============================
   HEADINGS
================================ */
h2, h3 {
  margin: 10px 0;
}

/* ===============================
   BUTTONS
================================ */
button {
  padding: 12px 25px;
  margin: 10px 5px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

#checkoutBtn, button {
  background-color: #00c896;
  color: white;
  font-size: 16px;
}

/* ===============================
   PAYPAL CONTAINER
================================ */
#paypal-button-container {
  margin-top: 20px;
}
  </style>
</head>
<body>

<div class="wrap">
  <h2>Checkout</h2>
  <h3>Total: $<span id="totalAmount">0.00</span></h3>
  <h3>Total PV: <span id="totalPV">0</span></h3>

  <div id="paypal-button-container"></div>
  <button onclick="payWithPaystack()">Pay With Paystack</button>
</div>

<script>
// ===============================
// LOAD ORDER DATA
// ===============================
let order = JSON.parse(localStorage.getItem("orderSummary"));
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!order || !currentUser){
  alert("Invalid checkout session.");
  window.location.href = "index.html";
}

document.getElementById("totalAmount").innerText = order.total.toFixed(2);
document.getElementById("totalPV").innerText = order.totalPV;

// ===============================
// PREPARE METADATA
// ===============================
let productNames = [];
let productIDs = [];
let productPVs = [];
let quantities = [];

order.cart.forEach(item=>{
  productNames.push(item.title);
  productIDs.push(item.id);
  productPVs.push(item.pv);
  quantities.push(item.quantity);
});

let sponsorID = currentUser.sponsorID || "NONE";
let buyerUserID = currentUser.userID || "UNKNOWN";

// ===============================
// PAYSTACK PAYMENT
// ===============================

  // ===============================
// PAYSTACK (AUTO CONVERT TO NGN)
// ===============================
function payWithPaystack(){

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));
  if(!currentUser){
    alert("Please login first");
    return;
  }

  // 🔥 Automatic Conversion Rate (You can adjust)
  let exchangeRate = 1350; 
  let totalNGN = totalUSD * exchangeRate;

  let handler = PaystackPop.setup({
    key: 'pk_live_ae2ef39d24e2f001cbc716def10d3ede5148af5b',
    email: currentUser.email,
    amount: Math.round(totalNGN * 100), // kobo
    currency: "NGN",
    ref: 'PS-' + Date.now(),

    callback: function(response){

      saveOrder(response.reference, totalUSD, "NGN");

      let totalPV = 0;
cart.forEach(item=>{
   totalPV += (item.pv || 0) * item.quantity;
});

processCommission(currentUser.email, totalAmount, totalPV);

      alert("Paystack Payment Successful!");
      window.location.href = "dashboard.html";
    },

    onClose: function(){
      alert("Transaction cancelled.");
    }

  });

  handler.openIframe();
    }

  
function payWithPaystack(){
  var handler = PaystackPop.setup({
    key: "pk_live_ae2ef39d24e2f001cbc716def10d3ede5148af5b",
    email: currentUser.email,
    amount: order.total * 100,
    currency: "USD",
    metadata: {
      custom_fields: [
        { display_name:"Buyer User ID", variable_name:"buyer_user_id", value: buyerUserID },
        { display_name:"Sponsor ID", variable_name:"sponsor_id", value: sponsorID },
        { display_name:"Product Names", variable_name:"product_names", value: productNames.join(", ") },
        { display_name:"Product IDs", variable_name:"product_ids", value: productIDs.join(", ") },
        { display_name:"Product PVs", variable_name:"product_pvs", value: productPVs.join(", ") },
        { display_name:"Quantities", variable_name:"quantities", value: quantities.join(", ") },
        { display_name:"Total PV", variable_name:"total_pv", value: order.totalPV }
      ]
    },
    callback: function(response){
      alert("Payment Successful");
      localStorage.removeItem("cart");
      localStorage.removeItem("orderSummary");
      window.location.href = "index.html";
    }
  });

  handler.openIframe();
}

// ===============================
// PAYPAL PAYMENT
// ===============================
paypal.Buttons({
  createOrder: function(data, actions) {
    return actions.order.create({
      purchase_units: [{
        amount: { value: order.total.toFixed(2) },
        description: `
BuyerID:${buyerUserID}
SponsorID:${sponsorID}
Products:${productNames.join("|")}
IDs:${productIDs.join("|")}
PVs:${productPVs.join("|")}
TotalPV:${order.totalPV}
        `
      }]
    });
  },

  onApprove: function(data, actions) {
    return actions.order.capture().then(function(details) {
      alert("PayPal Payment Completed");
      localStorage.removeItem("cart");
      localStorage.removeItem("orderSummary");
      window.location.href = "index.html";
    });
  }

}).render('#paypal-button-container');

</script>

</body>
</html>
