<!DOCTYPE html>
<html>
<head>
  <title>Submit Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="padding:40px;">
  <h2>Submit Your Project Details</h2>

  <input type="text" placeholder="Project Title">
  <textarea placeholder="Describe your project"></textarea>
  <input type="file">
  <button onclick="submitProject()">Submit</button>

  <h3>Messages</h3>
  <div id="userMessages"></div>
  <input type="text" id="newMessage" placeholder="Send message to admin">
  <button onclick="sendMessage()">Send</button>

  <button onclick="downloadInvoice()">Download Invoice</button>

  <hr>
  <div id="affiliateSection"></div>
</div>

<script>

// ===============================
// PROTECTION
// ===============================
// ===============================
  
  if(!localStorage.getItem("loggedIn")){
  alert("Please login first");
  window.location.href = "login.html";
}

let affiliateUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];

// ===============================
// MLM RANK SYSTEM
// ===============================
function calculateRank(pv){
  if(pv >= 100000) return {rank:"Crown", percent:20};
  if(pv >= 50000) return {rank:"Executive", percent:18};
  if(pv >= 20000) return {rank:"Director", percent:15};
  if(pv >= 5000) return {rank:"Leader", percent:12};
  if(pv >= 500) return {rank:"Builder", percent:10};
  if(pv >= 30) return {rank:"Starter", percent:8};
  return {rank:"None", percent:0};
}

// ===============================
// WITHDRAW REQUEST (30 PV REQUIRED)
// ===============================
function requestWithdrawal(){

  let user = users.find(u => u.email === affiliateUser.email);
  if(!user) return;

  if((user.personalPV || 0) < 30){
     alert("You must complete at least 30 Personal PV before withdrawing.");
     return;
  }

  if(user.withdrawable < 10){
     alert("Minimum withdrawal is $10");
     return;
  }

  let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];

  withdrawals.push({
    email:user.email,
    amount:user.withdrawable,
    status:"Pending"
  });

  localStorage.setItem("withdrawals", JSON.stringify(withdrawals));
  alert("Withdrawal Requested!");
}

// ===============================
// SHOW DASHBOARD
// ===============================
if(affiliateUser){

  let dbUser = users.find(u => u.email === affiliateUser.email);

  if(dbUser){

    let refLink = window.location.origin + "?ref=" + dbUser.email;
    let pvStatus = (dbUser.personalPV || 0) >= 30 ? "Activated" : "Not Activated";

    document.getElementById("affiliateSection").innerHTML = `
      <h3>Affiliate Dashboard</h3>
      <p><b>Affiliate ID:</b> ${dbUser.affiliateID || ""}</p>
      <p><b>Rank:</b> ${dbUser.rank || "None"}</p>
      <p><b>Total Earnings:</b> $${(dbUser.earnings || 0).toFixed(2)}</p>
      <p><b>Withdrawable:</b> ${
        (dbUser.personalPV || 0) >= 30 
        ? "$" + (dbUser.withdrawable || 0).toFixed(2)
        : "Locked (Complete 30 PV)"
      }</p>
      <p><b>Personal PV:</b> ${dbUser.personalPV || 0} ( ${pvStatus} )</p>
      <p><b>Total Network PV:</b> ${dbUser.totalPV || 0}</p>
      <p><b>Your Referral Link:</b></p>
      <input value="${refLink}" style="width:100%; padding:5px;">
      <br><br>
      <button onclick="requestWithdrawal()">Request Withdrawal</button>
    `;
  }
}

// ===============================
// ORIGINAL FUNCTIONS (UNCHANGED)
// ===============================
  function sendMessage(){

  let msg = document.getElementById("newMessage").value.trim();
  if(!msg) return;

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));
  let messages = JSON.parse(localStorage.getItem("messages")) || [];

  messages.push({
    from: currentUser.email,
    to: "admin",
    text: msg,
    date: Date.now()
  });

  localStorage.setItem("messages", JSON.stringify(messages));

  alert("Message Sent to Admin");
  }

  
function submitProject(){

  let title = document.querySelector("input[type='text']").value.trim();
  let description = document.querySelector("textarea").value.trim();

  if(!title || !description){
    alert("Project title and description required.");
    return;
  }

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  let projects = JSON.parse(localStorage.getItem("projects")) || [];

  projects.push({
    email: currentUser.email,
    title:title,
    description:description,
    date:Date.now()
  });

  localStorage.setItem("projects", JSON.stringify(projects));

  alert("Project Submitted Successfully!");
      }

  function updateProfile(){

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  let user = users.find(u => u.email === currentUser.email);
  if(!user) return;

  user.phone = document.getElementById("phone").value;
  user.address = document.getElementById("address").value;
  user.bankName = document.getElementById("bankName").value;
  user.accountNumber = document.getElementById("accountNumber").value;
  user.accountName = document.getElementById("accountName").value;

  localStorage.setItem("users", JSON.stringify(users));

  alert("Profile Updated");
  }
</script>
</body>
  </html>
