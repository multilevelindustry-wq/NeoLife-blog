<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    .collapsible {
      background-color: #f1f1f1;
      cursor: pointer;
      padding: 10px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .collapsible:after {
      content: '\25BC';
      float: right;
    }

    .collapsible.active:after {
      content: '\25B2';
    }

    .content {
      padding: 0 15px;
      display: none;
      overflow: hidden;
      border-left: 2px solid #ddd;
      border-right: 2px solid #ddd;
      border-bottom: 2px solid #ddd;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div style="padding:40px;">

  <!-- ADMIN LOGIN -->
  <div id="adminLogin">
    <h2>Admin Login</h2>
    <input type="text" id="adminPhone" placeholder="Phone Number"><br><br>
    <input type="password" id="adminPassword" placeholder="Password"><br><br>
    <button onclick="adminLogin()">Login</button>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDashboard" style="display:none;">
    <h2>Admin Dashboard</h2>

    <h3>Withdrawal Requests</h3>
    <div id="withdrawals"></div>

    <hr>

    <h3>User Submissions</h3>
    <div id="projects"></div>
    <hr>

    <h3>Registered Users</h3>
    <div id="allUsers"></div>

    <hr>

    <h3>User Messages</h3>
    <div id="messages"></div>
  </div>

</div>

<script>
// ===============================
// ADMIN ACCESS CONFIG
// ===============================
const ADMIN_PHONE = "08085995394";
const ADMIN_PASSWORD = "Neo5394Admin";

// ===============================
// ADMIN LOGIN
// ===============================
function adminLogin(){
  let phone = document.getElementById("adminPhone").value.trim();
  let pass = document.getElementById("adminPassword").value.trim();

  if(phone === ADMIN_PHONE && pass === ADMIN_PASSWORD){
    sessionStorage.setItem("adminLoggedIn","true");
    document.getElementById("adminLogin").style.display="none";
    document.getElementById("adminDashboard").style.display="block";
    startInactivityTimer();
    renderWithdrawals();
    renderProjects();
    renderMessages();
    renderUsers();
  } else {
    alert("Invalid Admin Credentials");
  }
}

// Auto login if session exists
if(sessionStorage.getItem("adminLoggedIn")==="true"){
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminDashboard").style.display="block";
  startInactivityTimer();
  setTimeout(()=>{
    renderWithdrawals();
    renderProjects();
    renderMessages();
    renderUsers();
  },100);
}

// ===============================
// 5 MINUTE AUTO LOCK
// ===============================
let inactivityTimer;
function resetTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(()=>{
    alert("Session expired due to inactivity.");
    sessionStorage.removeItem("adminLoggedIn");
    location.reload();
  }, 5 * 60 * 1000); // 5 minutes
}
function startInactivityTimer(){
  document.addEventListener("mousemove", resetTimer);
  document.addEventListener("keydown", resetTimer);
  resetTimer();
}

// ===============================
// COLLAPSIBLE FUNCTION
// ===============================
function makeCollapsible(){
  let coll = document.getElementsByClassName("collapsible");
  for(let i=0;i<coll.length;i++){
    coll[i].addEventListener("click", function(){
      this.classList.toggle("active");
      let content = this.nextElementSibling;
      if(content.style.display === "block"){
        content.style.display = "none";
      } else {
        content.style.display = "block";
      }
    });
  }
}

// ===============================
// WITHDRAWALS
// ===============================
let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

function renderWithdrawals(){
  let div = document.getElementById("withdrawals");
  div.innerHTML = "";
  withdrawals.forEach((w,i)=>{
    div.innerHTML += `
      <button class="collapsible">${w.email} - $${w.amount} - ${w.status}</button>
      <div class="content">
        <p>Status: ${w.status}</p>
        ${w.status==="Pending"?`<button onclick="approveWithdrawal(${i})">Approve</button>`:""}
      </div>
    `;
  });
  makeCollapsible();
}

function approveWithdrawal(index){
  withdrawals[index].status="Approved";
  let user = users.find(u=>u.email===withdrawals[index].email);
  if(user) user.withdrawable = 0;
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("withdrawals", JSON.stringify(withdrawals));
  alert("Withdrawal Approved.");
  renderWithdrawals();
}

// ===============================
// PROJECTS
// ===============================
function renderProjects(){
  let projects = JSON.parse(localStorage.getItem("projects")) || [];
  let div = document.getElementById("projects");
  div.innerHTML = "";
  projects.forEach(p=>{
    div.innerHTML += `
      <button class="collapsible">${p.email} - ${p.title}</button>
      <div class="content">
        <p>${p.description}</p>
      </div>
    `;
  });
  makeCollapsible();
}

// ===============================
// MESSAGES
// ===============================
function renderMessages(){
  let messages = JSON.parse(localStorage.getItem("messages")) || [];
  let div = document.getElementById("messages");
  div.innerHTML = "";
  messages.forEach((m,i)=>{
    div.innerHTML += `
      <button class="collapsible">${m.from} → ${m.to}</button>
      <div class="content">
        <p>${m.text}</p>
        ${m.to==="admin"?`<button onclick="replyUser('${m.from}')">Reply</button>`:""}
      </div>
    `;
  });
  makeCollapsible();
}

function replyUser(email){
  let text = prompt("Reply message:");
  if(!text) return;
  let messages = JSON.parse(localStorage.getItem("messages")) || [];
  messages.push({from:"admin", to:email, text:text, date:Date.now()});
  localStorage.setItem("messages", JSON.stringify(messages));
  alert("Reply sent.");
  renderMessages();
}

// ===============================
// USERS
// ===============================
function renderUsers(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let div = document.getElementById("allUsers");
  div.innerHTML = "";

  users.forEach(u=>{
    let sponsorUser = users.find(s => s.id === u.sponsorID);
    let sponsorDisplay = sponsorUser 
      ? sponsorUser.name 
      : (u.sponsorNameManual || "None");

    div.innerHTML += `
      <button class="collapsible">${u.name}</button>
      <div class="content">
        <p>Email: ${u.email}</p>
        <p>Affiliate ID: ${u.affiliateID}</p>
        <p>Sponsor: ${sponsorDisplay}</p>
        <p>Rank: ${u.rank}</p>
        <p>Personal PV: ${u.personalPV}</p>
        <p>Team PV: ${u.teamPV}</p>
        <p>Earnings: $${u.earnings}</p>
        <p>Withdrawable: $${u.withdrawable}</p>
        <p>Phone: ${u.phone || "Not Provided"}</p>
        <p>Address: ${u.address || "Not Provided"}</p>
        <p>Bank: ${u.bankName || "Not Provided"}</p>
        <p>Account No: ${u.accountNumber || "Not Provided"}</p>
        <p>Account Name: ${u.accountName || "Not Provided"}</p>
        <p>Date Joined: ${u.dateJoined}</p>
      </div>
    `;
  });
  makeCollapsible();
  }
</script>
</body>
</html>
