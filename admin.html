<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    .collapsible {
      background-color: #f1f1f1;
      cursor: pointer;
      padding: 10px;
      width: 100%;
      border: none;
      text-align: left;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .content {
      padding: 0 15px;
      display: none;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    .admin-btn {
      padding:5px 10px;
      margin-top:5px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div style="padding:40px;">

  <div id="adminLogin">
    <h2>Admin Login</h2>
    <input type="text" id="adminPhone" placeholder="Phone Number"><br><br>
    <input type="password" id="adminPassword" placeholder="Password"><br><br>
    <button onclick="adminLogin()">Login</button>
  </div>

  <div id="adminDashboard" style="display:none;">
    <h2>Admin Dashboard</h2>

    <h3>Withdrawal Requests</h3>
    <div id="withdrawals"></div>

    <h3>User Submissions</h3>
    <div id="projects"></div>

    <h3>Registered Users</h3>
    <div id="allUsers"></div>

    <h3>User Messages</h3>
    <div id="messages"></div>
  </div>

</div>

<script>

const ADMIN_PHONE = "08085995394";
const ADMIN_PASSWORD = "Neo5394Admin";

function adminLogin(){
  let phone = document.getElementById("adminPhone").value.trim();
  let pass = document.getElementById("adminPassword").value.trim();

  if(phone === ADMIN_PHONE && pass === ADMIN_PASSWORD){
    sessionStorage.setItem("adminLoggedIn","true");
    document.getElementById("adminLogin").style.display="none";
    document.getElementById("adminDashboard").style.display="block";
    renderAll();
  } else {
    alert("Invalid Admin Credentials");
  }
}

if(sessionStorage.getItem("adminLoggedIn")==="true"){
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminDashboard").style.display="block";
  setTimeout(renderAll,100);
}

function toggleContent(btn){
  let content = btn.nextElementSibling;
  content.style.display = content.style.display === "block" ? "none" : "block";
}

function renderAll(){
  renderWithdrawals();
  renderProjects();
  renderUsers();
  renderMessages();
}

function renderWithdrawals(){
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let div = document.getElementById("withdrawals");
  div.innerHTML = "";

  withdrawals.forEach((w,i)=>{
    div.innerHTML += `
      <button class="collapsible" onclick="toggleContent(this)">
        ${w.email} - $${w.amount} - ${w.status}
      </button>
      <div class="content">
        <p><b>Email:</b> ${w.email}</p>
        <p><b>Amount:</b> $${w.amount}</p>
        <p><b>Status:</b> ${w.status}</p>
        ${w.status === "Pending" ? 
        `<button class="admin-btn" onclick="approveWithdrawal(${i})">Approve</button>` : ""}
      </div>
    `;
  });
}

function approveWithdrawal(index){
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
  let users = JSON.parse(localStorage.getItem("users")) || [];

  withdrawals[index].status = "Approved";

  let user = users.find(u => u.email === withdrawals[index].email);
  if(user){
    user.withdrawable = 0;
  }

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("withdrawals", JSON.stringify(withdrawals));

  alert("Withdrawal Approved");
  renderWithdrawals();
}

function renderProjects(){
  let projects = JSON.parse(localStorage.getItem("projects")) || [];
  let div = document.getElementById("projects");
  div.innerHTML = "";

  projects.forEach(p=>{
    div.innerHTML += `
      <button class="collapsible" onclick="toggleContent(this)">
        ${p.email} - ${p.title}
      </button>
      <div class="content">
        <p><b>Email:</b> ${p.email}</p>
        <p><b>Title:</b> ${p.title}</p>
        <p><b>Description:</b> ${p.description}</p>
        <p><b>Date:</b> ${new Date(p.date).toLocaleString()}</p>
      </div>
    `;
  });
}

function renderUsers(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let div = document.getElementById("allUsers");
  div.innerHTML = "";

  users.forEach((u,index)=>{

    let sponsorUser = users.find(s => s.id === u.sponsorID);
    let sponsorDisplay = sponsorUser 
      ? sponsorUser.name 
      : (u.sponsorNameManual || "None");

    div.innerHTML += `
      <button class="collapsible" onclick="toggleContent(this)">
        ${u.name} - ${u.email}
      </button>
      <div class="content">
        <p><b>Email:</b> ${u.email}</p>
        <p><b>Affiliate ID:</b> ${u.affiliateID}</p>
        <p><b>Sponsor:</b> ${sponsorDisplay}</p>
        <p><b>Rank:</b> ${u.rank || "None"}</p>
        <p><b>Personal PV:</b> ${u.personalPV || 0}</p>
        <p><b>Team PV:</b> ${u.teamPV || 0}</p>
        <p><b>Total Earnings:</b> $${(u.earnings||0).toFixed(2)}</p>
        <p><b>Withdrawable:</b> $${(u.withdrawable||0).toFixed(2)}</p>
        <p><b>Phone:</b> ${u.phone || "Not Provided"}</p>
        <p><b>Address:</b> ${u.address || "Not Provided"}</p>
        <p><b>Bank:</b> ${u.bankName || "Not Provided"}</p>
        <p><b>Account No:</b> ${u.accountNumber || "Not Provided"}</p>
        <p><b>Account Name:</b> ${u.accountName || "Not Provided"}</p>
        <p><b>Date Joined:</b> ${u.dateJoined}</p>

        <button class="admin-btn" onclick="deleteUser(${index})">Delete User</button>
      </div>
    `;
  });
}

function deleteUser(index){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(confirm("Are you sure you want to delete this user?")){
    users.splice(index,1);
    localStorage.setItem("users", JSON.stringify(users));
    alert("User Deleted");
    renderUsers();
  }
}

function renderMessages(){
  let messages = JSON.parse(localStorage.getItem("messages")) || [];
  let div = document.getElementById("messages");
  div.innerHTML = "";

  messages.forEach(m=>{
    div.innerHTML += `
      <button class="collapsible" onclick="toggleContent(this)">
        ${m.from} → ${m.to}
      </button>
      <div class="content">
        <p><b>From:</b> ${m.from}</p>
        <p><b>To:</b> ${m.to}</p>
        <p><b>Message:</b> ${m.text}</p>
        <p><b>Date:</b> ${new Date(m.date).toLocaleString()}</p>
      </div>
    `;
  });
}

</script>
</body>
</html>
