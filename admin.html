<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<div style="padding:40px;">
  <h2>Admin Dashboard</h2>
  <h3>Withdrawal Requests</h3>
  <div id="withdrawals"></div>
</div>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!localStorage.getItem("loggedIn") || !currentUser || currentUser.email !== "admin@site.com"){
  alert("Access Denied!");
  window.location.href = "login.html";
}

let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

function renderWithdrawals(){

  let div = document.getElementById("withdrawals");
  div.innerHTML = "";

  withdrawals.forEach((w,i)=>{
    div.innerHTML += `
      <div style="border:1px solid #ddd; padding:10px; margin-bottom:10px;">
        <p><b>${w.email}</b></p>
        <p>Amount: $${w.amount}</p>
        <p>Status: ${w.status}</p>
        ${w.status==="Pending" ? `<button onclick="approveWithdrawal(${i})">Approve</button>` : ""}
      </div>
    `;
  });
}

function approveWithdrawal(index){

  withdrawals[index].status="Approved";

  let user = users.find(u=>u.email===withdrawals[index].email);
  if(user){
    user.withdrawable = 0;
  }

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("withdrawals", JSON.stringify(withdrawals));

  alert("Withdrawal Approved.");
  location.reload();
}

renderWithdrawals();

</script>
</body>
</html>
