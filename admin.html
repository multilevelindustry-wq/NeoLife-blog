<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    .collapsible {
      background-color: #f1f1f1;
      cursor: pointer;
      padding: 10px;
      width: 100%;
      border: none;
      text-align: left;
      font-size: 16px;
      margin-bottom: 5px;
    }
    .content {
      padding: 15px;
      display: none;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      background:#fff;
    }
  </style>
</head>
<body>

<div style="padding:40px;">

  <!-- ADMIN LOGIN -->
  <div id="adminLogin">
    <h2>Admin Login</h2>
    <input type="text" id="adminPhone" placeholder="Phone Number"><br><br>
    <input type="password" id="adminPassword" placeholder="Password"><br><br>
    <button onclick="adminLogin()">Login</button>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDashboard" style="display:none;">
    <h2>Admin Dashboard</h2>

    <h3>Withdrawal Requests</h3>
    <div id="withdrawals"></div>

    <h3>User Submissions</h3>
    <div id="projects"></div>

    <h3>Registered Users</h3>
    <div id="allUsers"></div>

    <h3>User Messages</h3>
    <div id="messages"></div>
  </div>

</div>

<script>

const ADMIN_PHONE = "08085995394";
const ADMIN_PASSWORD = "Neo5394Admin";

function adminLogin(){
  let phone = document.getElementById("adminPhone").value.trim();
  let pass = document.getElementById("adminPassword").value.trim();

  if(phone === ADMIN_PHONE && pass === ADMIN_PASSWORD){
    sessionStorage.setItem("adminLoggedIn","true");
    document.getElementById("adminLogin").style.display="none";
    document.getElementById("adminDashboard").style.display="block";
    renderAll();
  } else {
    alert("Invalid Admin Credentials");
  }
}

if(sessionStorage.getItem("adminLoggedIn")==="true"){
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminDashboard").style.display="block";
  setTimeout(renderAll,100);
}

/* ===============================
   COLLAPSIBLE FUNCTION
=============================== */
function makeCollapsible(){
  let coll = document.getElementsByClassName("collapsible");
  for(let i=0;i<coll.length;i++){
    coll[i].addEventListener("click", function(){
      let content = this.nextElementSibling;
      content.style.display =
        content.style.display === "block" ? "none" : "block";
    });
  }
}

function renderAll(){
  renderWithdrawals();
  renderProjects();
  renderUsers();
  renderMessages();
}

/* ===============================
   WITHDRAWALS (CONNECTED)
=============================== */
function renderWithdrawals(){
  let withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
  let div = document.getElementById("withdrawals");
  div.innerHTML = "";

  withdrawals.forEach((w,i)=>{
    div.innerHTML += `
      <button class="collapsible">
        ${w.email} - $${w.amount}
      </button>
      <div class="content">
        <p>Status: ${w.status}</p>
        <p>Date: ${new Date(w.date).toLocaleString()}</p>
      </div>
    `;
  });

  makeCollapsible();
}

/* ===============================
   PROJECTS (CONNECTED)
=============================== */
function renderProjects(){
  let projects = JSON.parse(localStorage.getItem("projects")) || [];
  let div = document.getElementById("projects");
  div.innerHTML = "";

  projects.forEach(p=>{
    div.innerHTML += `
      <button class="collapsible">
        ${p.email} - ${p.title}
      </button>
      <div class="content">
        <p>${p.description}</p>
        <p>Date: ${new Date(p.date).toLocaleString()}</p>
      </div>
    `;
  });

  makeCollapsible();
}

/* ===============================
   REGISTERED USERS (FULL DETAILS RESTORED)
=============================== */
function renderUsers(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let div = document.getElementById("allUsers");
  div.innerHTML = "";

  users.forEach(u=>{

    let sponsorUser = users.find(s => s.id === u.sponsorID);
    let sponsorDisplay = sponsorUser ? sponsorUser.name : "None";

    div.innerHTML += `
      <button class="collapsible">
        ${u.name}
      </button>

      <div class="content">
        <p><b>Email:</b> ${u.email}</p>
        <p><b>Affiliate ID:</b> ${u.affiliateID}</p>
        <p><b>Sponsor:</b> ${sponsorDisplay}</p>
        <p><b>Rank:</b> ${u.rank}</p>

        <hr>

        <p><b>Personal PV:</b> ${u.personalPV}</p>
        <p><b>Team PV:</b> ${u.teamPV || 0}</p>
        <p><b>Monthly PV:</b> ${u.monthlyPV || 0}</p>

        <hr>

        <p><b>Total Earnings:</b> $${(u.earnings||0).toFixed(2)}</p>
        <p><b>Withdrawable:</b> $${(u.withdrawable||0).toFixed(2)}</p>

        <hr>

        <p><b>Phone:</b> ${u.phone || "Not Provided"}</p>
        <p><b>Address:</b> ${u.address || "Not Provided"}</p>
        <p><b>Bank:</b> ${u.bankName || "Not Provided"}</p>
        <p><b>Account No:</b> ${u.accountNumber || "Not Provided"}</p>
        <p><b>Account Name:</b> ${u.accountName || "Not Provided"}</p>

        <hr>

        <p><b>Downlines:</b> ${u.downlines ? u.downlines.length : 0}</p>
        <p><b>Date Joined:</b> ${u.dateJoined || "N/A"}</p>
      </div>
    `;
  });

  makeCollapsible();
}

/* ===============================
   MESSAGES (CONNECTED)
=============================== */
function renderMessages(){
  let messages = JSON.parse(localStorage.getItem("messages")) || [];
  let div = document.getElementById("messages");
  div.innerHTML = "";

  messages.forEach(m=>{
    div.innerHTML += `
      <button class="collapsible">
        ${m.from} → ${m.to}
      </button>
      <div class="content">
        <p>${m.text}</p>
        <p>Date: ${new Date(m.date).toLocaleString()}</p>
      </div>
    `;
  });

  makeCollapsible();
}

</script>
</body>
</html>
