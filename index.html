<style>

/* ===============================
   YOUR BACKGROUND DESIGN
================================ */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* ================= HEADER ================= */
/* ================= HEADER LAYOUT FIX ================= */
header{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
  padding:20px;
}

/* Keep nav horizontal */
nav{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

   nav a {
  color: #fff;
  margin-left: 20px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

nav a:hover {
  color: #ff9800;
}

/* Search Box */
.search-container{
  width:100%;
  display:flex;
  justify-content:center;
}

#searchBox{
  width:50%;
  max-width:500px;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}

/* Mobile Fix */
@media(max-width:768px){
  #searchBox{
    width:90%;
  }
}


  
/* ================= BANNER ADS ================= */
.banner{
  height:320px;
  display:flex;
  gap:15px;
  padding:15px;
  background:linear-gradient(45deg,#ff7300,#ff9800);
  overflow:hidden;
}

.banner-ad{
  flex:1;
  position:relative;
  border-radius:15px;
  overflow:hidden;
}

.banner-ad img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
}

.banner-ad:hover img{
  transform:scale(1.05);
}

.banner-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
  color:white;
}

.banner-overlay h3{
  margin:5px 0;
}

.banner-overlay button{
  margin-top:8px;
  padding:8px 14px;
  font-size:14px;
}
/* ================= CATEGORY SLIDER ================= */
.category-wrapper{
  overflow:hidden;
  margin:20px;
}

.category-track{
  display:flex;
  gap:10px;
  animation:scrollLeft 25s linear infinite;
}

.category-card{
  min-width:180px;
  background:white;
  color:#111;
  padding:5px;
  border-radius:5px;
  text-align:center;
  font-weight:bold;
}

@keyframes scrollLeft{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* ================= PRODUCT GRID ================= */
.products{
  display:grid;
  gap:15px;
  padding:15px;
}

/* Mobile → 2 per row (like your picture) */
@media(max-width:767px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

/* Desktop → 3 per row */
@media(min-width:768px){
  .products{
    grid-template-columns:repeat(3,1fr);
  }
}

.card{
  background:white;
  color:#111;
  padding:5px;
  border-radius:5px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  background:linear-gradient(45deg,#ff7300,#ff9800);
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

/* ================= FEATURED ================= */
.featured{
  margin:40px;
  padding:30px;
  background:white;
  color:#111;
  border-radius:20px;
  text-align:center;
}

/* ================= COUNTDOWN ================= */
.countdown{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
  color:#ff9800;
}

/* ================= FLIP ADS ================= */
.flip-container{
  display:grid;
  gap:30px;
  padding:40px;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card-wrapper{
  perspective:700px;
}

.card-inner{
  position:relative;
  width:100%;
  height:200px;
  transition:transform 0.8s;
  transform-style:preserve-3d;
}

.card-inner{
  animation:autoFlip 6s infinite;
}

@keyframes autoFlip{
  0%{transform:rotateY(0)}
  40%{transform:rotateY(0)}
  50%{transform:rotateY(180deg)}
  90%{transform:rotateY(180deg)}
  100%{transform:rotateY(0)}
}

.card-front,.card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  padding:20px;
}

.card-front{background:white;color:#111;}
.card-back{
  transform:rotateY(180deg);
  background:linear-gradient(45deg,#ff7300,#ff9800);
}

 a{
    color: black;
 }

.card-back img{
   width: 100%;
   height: 100%;
   padding: 15px;
   border-radius: 10px;
}
</style>

/* ===============================
   CART SYSTEM
================================ */
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cart-count").innerText =
    cart.reduce((sum,item)=> sum + (item.quantity || 1),0);
}
updateCartCount();

function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let product = services.find(p => p.id === id);

  let existing = cart.find(i => i.id === id);
  if(existing){
    existing.quantity += 1;
  }else{
    cart.push({...product, quantity:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

  let h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((distance%(1000*60*60))/(1000*60));
  let s = Math.floor((distance%(1000*60))/1000);

  document.getElementById("countdown").innerText =
   "Flash Sale Ends In: " + h+"h "+m+"m "+s+"s";

},1000);

const searchBox = document.getElementById("searchBox");

function renderSearchResults(filtered){

  const section1 = document.getElementById("productSection1");
  const section2 = document.getElementById("productSection2");

  section1.innerHTML = "";
  section2.innerHTML = "";

  if(filtered.length === 0){
    section1.innerHTML = "<h3 style='grid-column:1/-1;text-align:center;'>No products found</h3>";
    return;
  }

  filtered.forEach((p,index)=>{

    const card = `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <strong>$${p.price}</strong>
        <button onclick="addToCart(${p.id})">
          Add To Cart
        </button>
      </div>
    `;

    if(index < 6){
      section1.innerHTML += card;
    }else{
      section2.innerHTML += card;
    }

  });
}

// ===============================
// CATEGORY MATCH
// ===============================
function getMatchingCategories(query){
  return categories.filter(cat => 
    cat.name.toLowerCase().includes(query)
  );
}

function renderCategorySearchResults(matched){

  if(matched.length === 0) return;

  const section1 = document.getElementById("productSection1");

  let html = `
    <div style="grid-column:1/-1;">
      <h3 style="text-align:center;">Related Categories</h3>
      <div style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin-bottom:20px;">
  `;

  matched.forEach(cat=>{
    html += `
      <a href="${cat.link}" style="text-decoration:none;">
        <div class="category-card" style="width:180px;">
          <img src="${cat.image}" 
               style="width:100%;height:100px;object-fit:cover;border-radius:10px;">
          <p>${cat.name}</p>
        </div>
      </a>
    `;
  });

  html += `</div></div>`;

  section1.innerHTML = html + section1.innerHTML;
}

// ===============================
// SEARCH INPUT LISTENER
// ===============================
if(searchBox){

  let timeout;

  searchBox.addEventListener("input", function(){

    clearTimeout(timeout);

    timeout = setTimeout(() => {

      let query = this.value.toLowerCase().trim();

      // If empty → restore original products
      if(query === ""){
        renderProducts("productSection1",0,6);
        renderProducts("productSection2",1,7);
        return;
      }

      // Filter products
      let filtered = services.filter(s => 
        s.title.toLowerCase().includes(query) || 
        s.description.toLowerCase().includes(query)
      );

      // Render products
      renderSearchResults(filtered);

      // Render matching categories on top
      let matchedCategories = getMatchingCategories(query);
      renderCategorySearchResults(matchedCategories);

    }, 300);

  });

}
