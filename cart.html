<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>

  <style>
/* ===============================
   PREMIUM BACKGROUND
================================ */

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
  background-size: cover;
  position: relative;
  min-height: 100vh;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* ===============================
   WRAPPER
================================ */

.wrapper {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* ===============================
   HEADER
================================ */

header {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  color: white;
}

nav a {
  color: white;
  text-decoration: none;
  margin-right: 15px;
  font-weight: 500;
}

nav a:hover {
  color: #00ffcc;
}

/* ===============================
   CART CARDS
================================ */

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 5px;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

#checkoutBtn {
  background: #00c896;
  color: white;
  padding: 12px 25px;
  font-size: 16px;
}

/* ===============================
   FOOTER
================================ */

footer {
  background: rgba(0,0,0,0.8);
  color: white;
  border-radius: 12px;
  padding: 30px;
  margin-top: 40px;
}
  </style>
</head>

<body>

<div class="wrapper">

<header>
  <h2>Your Cart</h2>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div id="cart-items"></div>

<div style="padding:40px; color:white;">
  <h2>Total: $<span id="total">0.00</span></h2>
  <a href="checkout.html">
    <button id="checkoutBtn">Proceed to Payment</button>
  </a>
</div>

<footer>
  <div style="display:flex; flex-wrap:wrap; justify-content:space-around;">
    <div>Privacy Policy</div>
    <div>Terms & Conditions</div>
    <div>Blog</div>
    <div>Customer Service</div>
    <div>Refund Policy</div>
    <div>FAQs</div>
    <div>About Us</div>
    <div>Contact Us</div>
  </div>

  <p style="text-align:center; margin-top:20px; font-size:14px;">
    © 2026 Your Company Name. All Rights Reserved.
  </p>
</footer>

</div>

<script>

// ============================
// LOGIN CHECK
// ============================

let loggedIn = localStorage.getItem("loggedIn");
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser || !loggedIn){
   alert("You must login before checking out.");
   window.location.href = "login.html";
}

// ============================
// CART DATA
// ============================

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart-items");
let total = 0;
let totalPV = 0;

// ============================
// RENDER CART
// ============================

function renderCart(){

  container.innerHTML = "";
  total = 0;
  totalPV = 0;

  if(cart.length === 0){
    container.innerHTML = "<h3 style='color:white;'>Your cart is empty.</h3>";
    document.getElementById("total").innerText = "0.00";
    return;
  }

  cart.forEach(function(item, index){

    let itemTotal = item.price * item.quantity;
    let itemPVTotal = (item.pv || 0) * item.quantity;

    total += itemTotal;
    totalPV += itemPVTotal;

    container.innerHTML += `
      <div class="card">
        <img src="${item.image}">
        <h3>${item.title}</h3>
        <p><b>Product ID:</b> ${item.id}</p>
        <p><b>PV:</b> ${item.pv || 0}</p>
        <p><b>Price:</b> $${item.price}</p>
        <p><b>Quantity:</b> ${item.quantity}</p>
        <p><strong>Subtotal: $${itemTotal.toFixed(2)}</strong></p>

        <button onclick="increase(${index})">+</button>
        <button onclick="decrease(${index})">-</button>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);

  localStorage.setItem("orderSummary", JSON.stringify({
    cart: cart,
    total: total,
    totalPV: totalPV,
    userId: currentUser?.id || "",
    sponsorId: currentUser?.sponsorId || ""
  }));
}

// ============================
// CART ACTIONS
// ============================

function increase(index){
  cart[index].quantity += 1;
  saveCart();
}

function decrease(index){
  if(cart[index].quantity > 1){
    cart[index].quantity -= 1;
  } else {
    cart.splice(index,1);
  }
  saveCart();
}

function removeItem(index){
  cart.splice(index,1);
  saveCart();
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// ============================
// INITIAL LOAD
// ============================

renderCart();

</script>

</body>
</html>
